name: Auto PR Comment

on:
  pull_request:
    types: [opened]

jobs:
  add-comment:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Add automated comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '@claude Review this PR against AGENTS.md standards:\n\n1. Verify backward compatibility — no features removed\n2. Check for performance impact — no unnecessary overhead\n3. Validate code follows protocol-driven, DRY principles\n4. If issues found, suggest fixes directly on the PR\n5. Run relevant tests if needed'
            })

      - name: Add Copilot review comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '@copilot indepth review and validate if its a right change and not bloating for the sake of it'
            })