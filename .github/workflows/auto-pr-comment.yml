name: Auto PR Comment

on:
  pull_request:
    types: [opened]

jobs:
  # Phase 1: Copilot reviews at T+6min (after Qodo/Coderabbit finish)
  copilot-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Wait for Qodo and Coderabbit to complete (~5 min)
        run: sleep 360

      - name: Post Copilot review request
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '@copilot Review this PR for bloat and necessity:\n\n1. Are these changes minimal and focused?\n2. Is any code added that isn\'t strictly needed?\n3. Could this be achieved with less complexity?\n4. Are there unnecessary refactors or scope creep?\n5. Check other reviewer comments above for context'
            })

  # Phase 2: Claude reviews at T+17min (after Copilot finishes — final strong reviewer)
  claude-review:
    runs-on: ubuntu-latest
    needs: copilot-review
    permissions:
      pull-requests: write
    steps:
      - name: Wait for Copilot to complete (~10 min)
        run: sleep 600

      - name: Post Claude review request (final reviewer)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '@claude You are the final reviewer. Read ALL comments above from Qodo, Coderabbit, and Copilot first.\n\nReview this PR as architecture lead per AGENTS.md:\n1. Protocol-driven: heavy code in wrapper, not core SDK?\n2. Backward compatible: no public API removed without deprecation?\n3. Performance: no hot-path regressions, lazy imports for optional deps?\n4. DRY: no duplication, reuses existing abstractions?\n5. Async-safe and multi-agent safe?\n6. Address any unresolved issues from other reviewers\n7. If fixes needed, push them directly to this branch'
            })