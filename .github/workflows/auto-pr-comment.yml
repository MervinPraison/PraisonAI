name: Auto PR Comment

# Review chain: CodeRabbit + Greptile (+ optional Qodo/Gemini) → Copilot → Claude (FINAL)
# Copilot posts only when required prior reviewers have finished.
# Claude posts only after Copilot has responded — never from Gemini/Greptile directly.
#
# IMPORTANT: @copilot ignores bot comments. All @copilot mentions must use
# PAT_TOKEN so the comment posts as MervinPraison (a real user).
#
# Claude trigger runs IN-BAND (same workflow) to avoid GitHub Actions
# blocking bot-triggered workflows with action_required approval gates.
on:
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [opened, synchronize]
  schedule:
    - cron: '30 3,9,15,21 * * *'
  workflow_dispatch:

env:
  MAX_POLL_ATTEMPTS: 20
  POLL_DELAY_MS: 30000
  CLAUDE_TRIGGER_LOGINS: '["MervinPraison","github-actions[bot]"]'

jobs:
  # ================================================================
  # HUMAN PRs: Trigger @copilot AFTER CodeRabbit posts its summary
  # ================================================================
  copilot-after-prior-reviewers:
    if: |
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       (
         github.event.comment.user.login == 'coderabbitai[bot]' ||
         github.event.comment.user.login == 'greptile-apps[bot]' ||
         contains(github.event.comment.user.login, 'gemini-code-assist') ||
         contains(github.event.comment.user.login, 'qodo-code-review')
       )) ||
      (github.event_name == 'pull_request_review' &&
       contains(github.event.review.user.login, 'qodo-code-review'))
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: read
    outputs:
      pr_number: ${{ steps.trigger.outputs.pr_number }}
      triggered: ${{ steps.trigger.outputs.triggered }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Post Copilot after prior reviewers complete
        id: trigger
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const path = require('path');
            const chain = require(path.join(process.env.GITHUB_WORKSPACE, '.github/scripts/pr-review-chain.js'));
            const prNumber =
              context.payload.issue?.number ||
              context.payload.pull_request?.number;
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            const result = await chain.maybeTriggerCopilot(
              github, context.repo.owner, context.repo.repo, prNumber, core,
              { prCreatedAt: pr.created_at }
            );
            core.setOutput('triggered', result.triggered ? 'true' : 'false');
            core.setOutput('pr_number', String(prNumber));

  # ================================================================
  # FALLBACK: Claude trigger for cases where Copilot chain fails/skips
  # Ensures Claude always runs after sufficient review time
  # ================================================================
  claude-fallback-timeout:
    if: |
      github.event_name == 'pull_request' &&
      github.event.action == 'opened'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      issues: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v4

      - name: Wait for review chain (25 min)
        run: sleep 1500

      - name: Trigger Claude only after prior reviewers + Copilot
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const path = require('path');
            const chain = require(path.join(process.env.GITHUB_WORKSPACE, '.github/scripts/pr-review-chain.js'));
            const mergeGate = require(path.join(process.env.GITHUB_WORKSPACE, '.github/scripts/merge-gate.js'));
            const pr = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const { comments, reviews } = await chain.listCommentsAndReviews(github, owner, repo, pr);
            const gate = chain.claudeFinalReady(comments, reviews, {
              prCreatedAt: context.payload.pull_request.created_at,
            });
            if (!gate.ready) {
              core.info(`Claude fallback skipped on PR #${pr}: ${gate.reason}`);
              return;
            }
            await github.rest.issues.createComment({
              issue_number: pr, owner, repo,
              body: mergeGate.FINAL_CLAUDE_REVIEW_BODY,
            });
            core.info(`Claude fallback triggered on PR #${pr}`);

  # ================================================================
  # Claude FINAL — only after Copilot responds (prior reviewers already done)
  # ================================================================
  claude-after-copilot:
    needs: [copilot-after-prior-reviewers]
    if: |
      always() &&
      needs.copilot-after-prior-reviewers.result == 'success' &&
      needs.copilot-after-prior-reviewers.outputs.triggered == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      issues: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Wait for Copilot review to complete
        id: poll
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ needs.copilot-after-prior-reviewers.outputs.pr_number }}
          MAX_POLL_ATTEMPTS: ${{ env.MAX_POLL_ATTEMPTS }}
          POLL_DELAY_MS: ${{ env.POLL_DELAY_MS }}
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const path = require('path');
            const chain = require(path.join(process.env.GITHUB_WORKSPACE, '.github/scripts/pr-review-chain.js'));
            const pr = parseInt(process.env.PR_NUMBER, 10);
            const result = await chain.pollCopilotResponse(
              github, context.repo.owner, context.repo.repo, pr, {
                maxAttempts: parseInt(process.env.MAX_POLL_ATTEMPTS, 10),
                delayMs: parseInt(process.env.POLL_DELAY_MS, 10),
              }
            );
            core.setOutput('copilot_ready', result.ready ? 'true' : 'false');
            if (!result.ready) core.info(`Copilot not ready: ${result.reason}`);

      - name: Trigger Claude final review
        if: steps.poll.outputs.copilot_ready == 'true'
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ needs.copilot-after-prior-reviewers.outputs.pr_number }}
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const path = require('path');
            const chain = require(path.join(process.env.GITHUB_WORKSPACE, '.github/scripts/pr-review-chain.js'));
            const mergeGate = require(path.join(process.env.GITHUB_WORKSPACE, '.github/scripts/merge-gate.js'));
            const pr = parseInt(process.env.PR_NUMBER, 10);
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const { data: prData } = await github.rest.pulls.get({ owner, repo, pull_number: pr });
            const { comments, reviews } = await chain.listCommentsAndReviews(github, owner, repo, pr);
            const gate = chain.claudeFinalReady(comments, reviews, { prCreatedAt: prData.created_at });
            if (!gate.ready) {
              core.info(`Skip Claude on PR #${pr}: ${gate.reason}`);
              return;
            }
            await github.rest.issues.createComment({
              issue_number: pr, owner, repo,
              body: mergeGate.FINAL_CLAUDE_REVIEW_BODY,
            });
            core.info(`Claude FINAL triggered on PR #${pr} after Copilot + prior reviewers`);

      - name: Sync pipeline status labels
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ needs.copilot-after-prior-reviewers.outputs.pr_number }}
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const path = require('path');
            const ps = require(path.join(process.env.GITHUB_WORKSPACE, '.github/scripts/pipeline-status.js'));
            const pr = parseInt(process.env.PR_NUMBER, 10);
            await ps.ensurePipelineLabels(github, context.repo.owner, context.repo.repo, core);
            await ps.syncPipelineLabels(github, context.repo.owner, context.repo.repo, pr, core);

  # ================================================================
  # Recovery: post FINAL @claude if merge-conflict comment blocked the chain
  # (e.g. conflict fired before claude-after-copilot could post review prompt)
  # ================================================================
  claude-review-recovery:
    if: |
      github.event_name == 'pull_request' &&
      github.event.action == 'synchronize'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v4

      - name: Re-post FINAL Claude review when stale or missing
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const path = require('path');
            const mergeGate = require(path.join(process.env.GITHUB_WORKSPACE, '.github/scripts/merge-gate.js'));
            const chain = require(path.join(process.env.GITHUB_WORKSPACE, '.github/scripts/pr-review-chain.js'));
            const pr = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const comments = await mergeGate.listAllComments(github, owner, repo, pr);
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner, repo, pull_number: pr, per_page: 100,
            });
            const headPushedAt = (await mergeGate.getHeadCommitDate(github, owner, repo, pr))
              || context.payload.pull_request.updated_at;
            const headPusher = context.payload.sender?.login || null;

            const hasFinal = mergeGate.hasFinalClaudeReviewTrigger(comments);
            const isStale = mergeGate.isStaleFinalAfterPush(comments, headPushedAt);

            if (mergeGate.shouldSkipFinalRecovery(comments, headPushedAt)) {
              core.info('Recent @claude within 35min and FINAL not stale — skip recovery');
              return;
            }

            if (await mergeGate.hasInProgressClaudeAssistant(github, owner, repo, pr)) {
              core.info('Claude workflow in progress — skip recovery');
              return;
            }

            const finalBody = mergeGate.FINAL_CLAUDE_REVIEW_BODY;

            if (hasFinal && isStale) {
              const gate = mergeGate.shouldSkipStaleFinalRecovery(comments, headPushedAt, headPusher);
              if (gate.skip) {
                core.info(`Skip stale-FINAL recovery: ${gate.reason}`);
                return;
              }
              const ready = chain.claudeFinalReady(comments, reviews, {
                prCreatedAt: context.payload.pull_request.created_at,
              });
              if (!ready.ready && !ready.already) {
                core.info(`Skip stale-FINAL recovery — chain incomplete: ${ready.reason}`);
                return;
              }
              if (ready.already) {
                core.info('Claude FINAL already triggered — skip stale recovery');
                return;
              }
              await github.rest.issues.createComment({ issue_number: pr, owner, repo, body: finalBody });
              core.info(`Posted stale-FINAL recovery @claude on PR #${pr}`);
              return;
            }

            if (hasFinal) {
              core.info('FINAL Claude review current on HEAD — skip recovery');
              return;
            }

            const ready = chain.claudeFinalReady(comments, reviews, {
              prCreatedAt: context.payload.pull_request.created_at,
            });
            if (!ready.ready) {
              core.info(`Skip missing-FINAL recovery: ${ready.reason}`);
              return;
            }

            await github.rest.issues.createComment({ issue_number: pr, owner, repo, body: finalBody });
            core.info(`Posted missing FINAL Claude review on PR #${pr}`);

      - name: Sync pipeline status labels
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const path = require('path');
            const ps = require(path.join(process.env.GITHUB_WORKSPACE, '.github/scripts/pipeline-status.js'));
            const pr = context.payload.pull_request.number;
            await ps.ensurePipelineLabels(github, context.repo.owner, context.repo.repo, core);
            await ps.syncPipelineLabels(github, context.repo.owner, context.repo.repo, pr, core);

  # Scheduled: re-post @claude when FINAL is stale (Claude pushed after last FINAL trigger)
  stale-final-recovery-scheduled:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v4

      - name: Re-post stale FINAL @claude on open internal PRs
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const path = require('path');
            const mergeGate = require(path.join(process.env.GITHUB_WORKSPACE, '.github/scripts/merge-gate.js'));
            const chain = require(path.join(process.env.GITHUB_WORKSPACE, '.github/scripts/pr-review-chain.js'));
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prs = await github.paginate(github.rest.pulls.list, {
              owner, repo, state: 'open', per_page: 100,
            });
            let posted = 0;
            for (const pr of prs) {
              if (pr.draft) continue;
              if (pr.head?.repo?.full_name && pr.head.repo.full_name !== `${owner}/${repo}`) continue;
              const comments = await mergeGate.listAllComments(github, owner, repo, pr.number);
              const { data: reviews } = await github.rest.pulls.listReviews({
                owner, repo, pull_number: pr.number, per_page: 100,
              });
              const headPushedAt = (await mergeGate.getHeadCommitDate(github, owner, repo, pr.number)) || pr.updated_at;
              if (!mergeGate.needsStaleFinalRecovery(comments, headPushedAt)) continue;
              if (mergeGate.hasRecentClaudeTrigger(comments, 10)) {
                core.info(`PR #${pr.number}: stale FINAL but @claude within 10min — skip`);
                continue;
              }
              if (await mergeGate.hasInProgressClaudeAssistant(github, owner, repo, pr.number)) {
                core.info(`PR #${pr.number}: Claude workflow in progress — skip`);
                continue;
              }
              const gate = mergeGate.shouldSkipStaleFinalRecovery(comments, headPushedAt);
              if (gate.skip) {
                core.info(`PR #${pr.number}: skip stale-FINAL — ${gate.reason}`);
                continue;
              }
              const ready = chain.claudeFinalReady(comments, reviews, { prCreatedAt: pr.created_at });
              if (!ready.ready) {
                core.info(`PR #${pr.number}: skip scheduled recovery — ${ready.reason}`);
                continue;
              }
              await github.rest.issues.createComment({
                issue_number: pr.number, owner, repo,
                body: mergeGate.FINAL_CLAUDE_REVIEW_BODY,
              });
              posted++;
              core.info(`Posted scheduled stale-FINAL recovery on PR #${pr.number}`);
              if (posted >= 5) break;
            }
            core.info(`Scheduled stale-FINAL recovery complete (${posted} posted)`);

  # ================================================================
  # BOT PRs: CodeRabbit/Qodo skip bot-authored PRs by default.
  # Trigger them explicitly. Do NOT trigger Copilot here — it will
  # be triggered by copilot-after-coderabbit/qodo when they finish.
  # ================================================================
  bot-pr-trigger-reviews:
    if: |
      github.event_name == 'pull_request' &&
      github.event.action == 'opened' &&
      (
        github.event.pull_request.user.login == 'github-actions[bot]' ||
        github.event.pull_request.user.login == 'praisonai-triage-agent[bot]' ||
        github.event.pull_request.user.type == 'Bot'
      )
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Trigger CodeRabbit and Qodo reviews
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const path = require('path');
            const chain = require(path.join(process.env.GITHUB_WORKSPACE, '.github/scripts/bot-pr-review-chain.js'));
            const pr = context.payload.pull_request.number;
            await chain.kickReviewChain(github, context.repo.owner, context.repo.repo, pr, core);

      - name: Sync pipeline status labels
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const path = require('path');
            const ps = require(path.join(process.env.GITHUB_WORKSPACE, '.github/scripts/pipeline-status.js'));
            const pr = context.payload.pull_request.number;
            await ps.ensurePipelineLabels(github, context.repo.owner, context.repo.repo, core);
            await ps.syncPipelineLabels(github, context.repo.owner, context.repo.repo, pr, core);