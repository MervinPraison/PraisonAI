name: Auto PR Comment

# Sequential chain: Wait for first reviewer to finish, THEN trigger Copilot
# Triggers when Coderabbit OR Qodo posts their review (whichever first)
# Also triggers directly for bot-authored PRs (CodeRabbit/Qodo skip bot PRs)
on:
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [opened]

jobs:
  # Trigger @copilot AFTER Coderabbit posts its review summary
  copilot-after-coderabbit:
    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      github.event.comment.user.login == 'coderabbitai[bot]' &&
      contains(github.event.comment.body, 'summary by coderabbit')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Post Copilot review request
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Check if @copilot was already posted to avoid duplicates
            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            const alreadyPosted = comments.data.some(c => 
              c.user.login === 'github-actions[bot]' && c.body.includes('@copilot')
            );
            if (alreadyPosted) {
              console.log('Copilot already triggered, skipping');
              return;
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '@copilot Do a thorough review of this PR. Read ALL existing reviewer comments above from Qodo and Coderabbit first — incorporate their findings.\n\nReview areas:\n1. **Bloat check**: Are changes minimal and focused? Any unnecessary code or scope creep?\n2. **Security**: Any hardcoded secrets, unsafe eval/exec, missing input validation?\n3. **Performance**: Any module-level heavy imports? Hot-path regressions?\n4. **Tests**: Are tests included? Do they cover the changes adequately?\n5. **Backward compat**: Any public API changes without deprecation?\n6. **Code quality**: DRY violations, naming conventions, error handling?\n7. **Address reviewer feedback**: If Qodo or Coderabbit flagged valid issues, include them in your review\n8. Suggest specific improvements with code examples where possible'
            })

  # Fallback: Trigger @copilot after Qodo review (if Coderabbit doesn't fire)
  copilot-after-qodo:
    if: |
      github.event_name == 'pull_request_review' &&
      github.event.review.user.login == 'qodo-code-review[bot]'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Post Copilot review request (fallback via Qodo)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Check if @copilot was already posted to avoid duplicates
            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            const alreadyPosted = comments.data.some(c => 
              c.user.login === 'github-actions[bot]' && c.body.includes('@copilot')
            );
            if (alreadyPosted) {
              console.log('Copilot already triggered, skipping');
              return;
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '@copilot Do a thorough review of this PR. Read ALL existing reviewer comments above first.\n\nReview areas:\n1. **Bloat check**: Are changes minimal and focused?\n2. **Security**: Any hardcoded secrets, unsafe eval/exec, missing input validation?\n3. **Performance**: Any module-level heavy imports? Hot-path regressions?\n4. **Tests**: Are tests included? Do they cover the changes adequately?\n5. **Backward compat**: Any public API changes without deprecation?\n6. **Code quality**: DRY violations, naming conventions, error handling?\n7. Suggest specific improvements with code examples where possible'
            })

  # Direct trigger for bot-authored PRs (CodeRabbit/Qodo skip bot PRs by default)
  # Triggers @coderabbitai, Qodo /review, AND @copilot directly
  bot-pr-review-chain:
    if: |
      github.event_name == 'pull_request' &&
      github.event.action == 'opened' &&
      github.event.pull_request.user.login == 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Trigger full review chain for bot PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Trigger CodeRabbit
            await github.rest.issues.createComment({
              issue_number: pr, owner, repo,
              body: '@coderabbitai review'
            });

            // Trigger Qodo
            await github.rest.issues.createComment({
              issue_number: pr, owner, repo,
              body: '/review'
            });

            // Trigger Copilot directly (don't wait for CodeRabbit/Qodo)
            await github.rest.issues.createComment({
              issue_number: pr, owner, repo,
              body: '@copilot Do a thorough review of this PR.\n\nReview areas:\n1. **Bloat check**: Are changes minimal and focused?\n2. **Security**: Any hardcoded secrets, unsafe eval/exec, missing input validation?\n3. **Performance**: Any module-level heavy imports? Hot-path regressions?\n4. **Tests**: Are tests included? Do they cover the changes adequately?\n5. **Backward compat**: Any public API changes without deprecation?\n6. **Code quality**: DRY violations, naming conventions, error handling?\n7. Suggest specific improvements with code examples where possible'
            });

            console.log(`Triggered CodeRabbit, Qodo, and Copilot for bot PR #${pr}`);