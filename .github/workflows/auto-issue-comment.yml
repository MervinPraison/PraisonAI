name: Auto Issue Comment

on:
  issues:
    types: [opened]

jobs:
  # Default: Claude handles issue analysis and fix
  claude-fix:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Post Claude analysis request
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '@claude Analyze this issue and implement a fix following AGENTS.md:\n\n1. **Classification**: Bug, feature request, question, or documentation gap?\n2. **Root cause**: Search the codebase and identify the likely root cause\n3. **Fix**: Implement a minimal, focused fix\n4. Ensure backward compatibility — no features removed\n5. Zero performance regression on hot paths\n6. Run tests to verify the fix\n7. Create a PR with your changes using gh'
            })

