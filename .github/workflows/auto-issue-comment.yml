name: Auto Issue Comment

on:
  issues:
    types: [opened]

jobs:
  # Trigger Claude by adding the 'claude' label (only if not already labeled)
  # Note: @claude in comments only works from human users (not bots)
  # The claude.yml workflow listens for issues:labeled event with 'claude' label
  trigger-claude:
    # Skip if issue was already created with 'claude' label to avoid double-trigger
    if: |
      !contains(toJSON(github.event.issue.labels), 'claude')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Add claude label to trigger analysis
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Check if 'claude' label already exists on this issue
            const labels = context.payload.issue.labels.map(l => l.name);
            if (labels.includes('claude')) {
              console.log('Issue already has claude label, skipping');
              return;
            }

            // Add label to trigger claude.yml via issues:labeled event
            await github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['claude']
            });

            // Also post instructions as a comment for context
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🤖 Auto-triaging with Claude. Analyzing issue and implementing a fix...\n\nClaude will:\n1. Classify this issue\n2. Search codebase for root cause\n3. Implement a minimal fix following AGENTS.md\n4. Create a PR with the changes'
            });