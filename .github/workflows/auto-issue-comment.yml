name: Auto Issue Comment

on:
  issues:
    types: [opened]

jobs:
  # Phase 1: Copilot triages immediately
  copilot-triage:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Post Copilot triage request
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '@copilot Do a thorough triage and analysis of this issue:\n\n1. **Classification**: Is this a bug, feature request, question, or documentation gap?\n2. **Severity**: Critical / High / Medium / Low — explain why\n3. **Affected area**: Which modules/files in the codebase are relevant?\n4. **Root cause analysis**: Search the codebase and identify the likely root cause\n5. **Impact assessment**: What else could be affected? Any related issues?\n6. **Suggested fix**: Propose a concrete solution approach with file paths\n7. **Effort estimate**: Small (hours) / Medium (day) / Large (days+)'
            })

  # Phase 2: Claude analyzes and implements fix (final, strong reviewer)
  claude-fix:
    runs-on: ubuntu-latest
    needs: copilot-triage
    permissions:
      issues: write
      contents: write
      pull-requests: write
    steps:
      - name: Wait for Copilot triage (~10 min)
        run: sleep 600

      - name: Post Claude analysis request (final reviewer)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '@claude You are the lead engineer. Read Copilot\'s triage above first.\n\nAnalyze this issue and implement a fix following AGENTS.md:\n1. Ensure backward compatibility — no features removed\n2. Zero performance regression on hot paths\n3. Minimal, focused changes only\n4. Run tests to verify the fix\n5. Create a PR with your changes using gh'
            })