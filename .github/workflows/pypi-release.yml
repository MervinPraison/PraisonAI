name: PyPI Release

# Environments (Settings → Environments):
#   pypi-auto — patch releases from ci/nightly (no reviewers, main branch only)
#   pypi      — manual workflow_dispatch and major/minor (required reviewers)

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type for all packages (agents, code, wrapper)'
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: 'Preview versions and steps without publishing or pushing'
        required: false
        default: false
        type: boolean
      skip_agents:
        description: 'Skip agents publish (recovery if already on PyPI)'
        required: false
        default: false
        type: boolean
      skip_wrapper:
        description: 'Skip wrapper publish (agents and/or code only)'
        required: false
        default: false
        type: boolean
      skip_code:
        description: 'Skip praisonai-code publish (recovery if already on PyPI)'
        required: false
        default: false
        type: boolean
      skip_bot:
        description: 'Skip praisonai-bot publish (recovery if already on PyPI)'
        required: false
        default: false
        type: boolean
      agents_version:
        description: 'Override agents version (empty = auto bump from pyproject.toml)'
        required: false
        default: ''
        type: string
      wrapper_version:
        description: 'Override wrapper version (empty = auto bump from version.py)'
        required: false
        default: ''
        type: string
      code_version:
        description: 'Override praisonai-code version (empty = auto bump from pyproject.toml)'
        required: false
        default: ''
        type: string
      bot_version:
        description: 'Override praisonai-bot version (empty = auto bump from pyproject.toml)'
        required: false
        default: ''
        type: string
      source:
        description: 'Trigger source (audit trail)'
        required: false
        default: manual
        type: choice
        options:
          - manual
          - nightly
          - ci
      trigger_sha:
        description: 'Main commit SHA that passed release gate (audit/dedupe)'
        required: false
        default: ''
        type: string

permissions:
  contents: write

concurrency:
  group: pypi-release
  cancel-in-progress: false

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: >-
      ${{
        (inputs.source == 'ci' || inputs.source == 'nightly') &&
        inputs.bump == 'patch' &&
        'pypi-auto' || 'pypi'
      }}
    env:
      UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN || secrets.PYPI_API_TOKEN }}
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    steps:
      - name: Checkout main
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.11'

      - name: Set up uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a  # v4

      - name: Configure git
        run: |
          git config user.name "MervinPraison"
          git config user.email "454862+MervinPraison@users.noreply.github.com"
          gh auth setup-git

      - name: Release summary
        run: |
          echo "Source: ${{ inputs.source }}"
          echo "Trigger SHA: ${{ inputs.trigger_sha }}"
          echo "Bump:   ${{ inputs.bump }}"
          echo "Dry run: ${{ inputs.dry_run }}"
          echo "Environment: ${{ (inputs.source == 'ci' || inputs.source == 'nightly') && inputs.bump == 'patch' && 'pypi-auto' || 'pypi' }}"

      - name: Compute release versions
        id: versions
        env:
          BUMP: ${{ inputs.bump }}
          AGENTS_OVERRIDE: ${{ inputs.agents_version }}
          WRAPPER_OVERRIDE: ${{ inputs.wrapper_version }}
          CODE_OVERRIDE: ${{ inputs.code_version }}
          BOT_OVERRIDE: ${{ inputs.bot_version }}
          SKIP_AGENTS: ${{ inputs.skip_agents }}
          SKIP_CODE: ${{ inputs.skip_code }}
          SKIP_BOT: ${{ inputs.skip_bot }}
        run: |
          python <<'PY'
          import os
          import re
          import sys
          from pathlib import Path

          SEMVER = re.compile(r"^\d+\.\d+\.\d+$")
          root = Path(".")
          bump = os.environ["BUMP"]

          def bump_version(version: str) -> str:
              parts = version.split(".")
              if len(parts) != 3:
                  print(f"Invalid version: {version}", file=sys.stderr)
                  sys.exit(1)
              maj, min_, patch = (int(parts[0]), int(parts[1]), int(parts[2]))
              if bump == "major":
                  return f"{maj + 1}.0.0"
              if bump == "minor":
                  return f"{maj}.{min_ + 1}.0"
              return f"{maj}.{min_}.{patch + 1}"

          def validate_version(label: str, value: str) -> None:
              if value and not SEMVER.match(value):
                  print(f"Invalid {label} override: {value!r} (expected X.Y.Z)", file=sys.stderr)
                  sys.exit(1)

          agents_override = os.environ.get("AGENTS_OVERRIDE", "").strip()
          wrapper_override = os.environ.get("WRAPPER_OVERRIDE", "").strip()
          code_override = os.environ.get("CODE_OVERRIDE", "").strip()
          bot_override = os.environ.get("BOT_OVERRIDE", "").strip()
          validate_version("agents_version", agents_override)
          validate_version("wrapper_version", wrapper_override)
          validate_version("code_version", code_override)
          validate_version("bot_version", bot_override)

          agents_pyproject = root / "src/praisonai-agents/pyproject.toml"
          agents_content = agents_pyproject.read_text()
          agents_match = re.search(r'^version\s*=\s*"([^"]+)"', agents_content, re.MULTILINE)
          if not agents_match:
              print("Could not read agents version from pyproject.toml", file=sys.stderr)
              sys.exit(1)
          current_agents = agents_match.group(1)

          code_pyproject = root / "src/praisonai-code/pyproject.toml"
          code_content = code_pyproject.read_text()
          code_match = re.search(r'^version\s*=\s*"([^"]+)"', code_content, re.MULTILINE)
          if not code_match:
              print("Could not read praisonai-code version from pyproject.toml", file=sys.stderr)
              sys.exit(1)
          current_code = code_match.group(1)

          bot_pyproject = root / "src/praisonai-bot/pyproject.toml"
          bot_content = bot_pyproject.read_text()
          bot_match = re.search(r'^version\s*=\s*"([^"]+)"', bot_content, re.MULTILINE)
          if not bot_match:
              print("Could not read praisonai-bot version from pyproject.toml", file=sys.stderr)
              sys.exit(1)
          current_bot = bot_match.group(1)

          wrapper_version_py = root / "src/praisonai/praisonai/version.py"
          wrapper_content = wrapper_version_py.read_text()
          wrapper_match = re.search(r'__version__ = "([^"]+)"', wrapper_content)
          if not wrapper_match:
              print("Could not read wrapper version from version.py", file=sys.stderr)
              sys.exit(1)
          current_wrapper = wrapper_match.group(1)

          for label, value in (
              ("agents", current_agents),
              ("code", current_code),
              ("bot", current_bot),
              ("wrapper", current_wrapper),
          ):
              if not SEMVER.match(value):
                  print(f"Invalid current {label} version: {value}", file=sys.stderr)
                  sys.exit(1)

          skip_agents = os.environ.get("SKIP_AGENTS", "false").lower() == "true"
          skip_code = os.environ.get("SKIP_CODE", "false").lower() == "true"
          skip_bot = os.environ.get("SKIP_BOT", "false").lower() == "true"

          if agents_override:
              agents_version = agents_override
          elif skip_agents:
              agents_version = current_agents
          else:
              agents_version = bump_version(current_agents)

          if code_override:
              code_version = code_override
          elif skip_code:
              code_version = current_code
          else:
              code_version = bump_version(current_code)

          if bot_override:
              bot_version = bot_override
          elif skip_bot:
              bot_version = current_bot
          else:
              bot_version = bump_version(current_bot)

          if wrapper_override:
              wrapper_version = wrapper_override
          else:
              wrapper_version = bump_version(current_wrapper)

          github_output = os.environ["GITHUB_OUTPUT"]
          with open(github_output, "a", encoding="utf-8") as fh:
              fh.write(f"agents_version={agents_version}\n")
              fh.write(f"code_version={code_version}\n")
              fh.write(f"bot_version={bot_version}\n")
              fh.write(f"wrapper_version={wrapper_version}\n")
              fh.write(f"current_agents={current_agents}\n")
              fh.write(f"current_code={current_code}\n")
              fh.write(f"current_bot={current_bot}\n")
              fh.write(f"current_wrapper={current_wrapper}\n")

          print(f"Agents:  {current_agents} -> {agents_version}")
          print(f"Code:    {current_code} -> {code_version}")
          print(f"Bot:     {current_bot} -> {bot_version}")
          print(f"Wrapper: {current_wrapper} -> {wrapper_version}")
          PY

      - name: Detect existing PyPI versions
        id: pypi_exists
        if: inputs.dry_run != true
        env:
          AGENTS_VERSION: ${{ steps.versions.outputs.agents_version }}
          CODE_VERSION: ${{ steps.versions.outputs.code_version }}
          BOT_VERSION: ${{ steps.versions.outputs.bot_version }}
          WRAPPER_VERSION: ${{ steps.versions.outputs.wrapper_version }}
          INPUT_SKIP_AGENTS: ${{ inputs.skip_agents }}
          INPUT_SKIP_CODE: ${{ inputs.skip_code }}
          INPUT_SKIP_BOT: ${{ inputs.skip_bot }}
          INPUT_SKIP_WRAPPER: ${{ inputs.skip_wrapper }}
        run: |
          set -euo pipefail
          skip_agents="${INPUT_SKIP_AGENTS}"
          skip_code="${INPUT_SKIP_CODE}"
          skip_bot="${INPUT_SKIP_BOT}"
          skip_wrapper="${INPUT_SKIP_WRAPPER}"
          if [ "$skip_agents" != "true" ]; then
            curl -fsSL "https://pypi.org/pypi/praisonaiagents/${AGENTS_VERSION}/json" >/dev/null && skip_agents=true || true
          fi
          if [ "$skip_code" != "true" ]; then
            curl -fsSL "https://pypi.org/pypi/praisonai-code/${CODE_VERSION}/json" >/dev/null && skip_code=true || true
          fi
          if [ "$skip_bot" != "true" ]; then
            curl -fsSL "https://pypi.org/pypi/praisonai-bot/${BOT_VERSION}/json" >/dev/null && skip_bot=true || true
          fi
          if [ "$skip_wrapper" != "true" ]; then
            curl -fsSL "https://pypi.org/pypi/praisonai/${WRAPPER_VERSION}/json" >/dev/null && skip_wrapper=true || true
          fi
          echo "skip_agents=${skip_agents}" >> "$GITHUB_OUTPUT"
          echo "skip_code=${skip_code}" >> "$GITHUB_OUTPUT"
          echo "skip_bot=${skip_bot}" >> "$GITHUB_OUTPUT"
          echo "skip_wrapper=${skip_wrapper}" >> "$GITHUB_OUTPUT"
          if [ "$skip_agents" = "true" ] && [ "$skip_code" = "true" ] && [ "$skip_bot" = "true" ] && [ "$skip_wrapper" = "true" ]; then
            echo "All target versions already on PyPI — nothing to publish."
          fi

      - name: Exit if already published
        if: >-
          inputs.dry_run != true &&
          steps.pypi_exists.outputs.skip_agents == 'true' &&
          steps.pypi_exists.outputs.skip_code == 'true' &&
          steps.pypi_exists.outputs.skip_bot == 'true' &&
          steps.pypi_exists.outputs.skip_wrapper == 'true'
        run: echo "Idempotent skip — target versions already on PyPI."

      - name: Dry run summary
        if: inputs.dry_run
        run: |
          echo "Dry run — no publish, commit, or push."
          echo "Agents version:  ${{ steps.versions.outputs.agents_version }}"
          echo "Code version:    ${{ steps.versions.outputs.code_version }}"
          echo "Bot version:     ${{ steps.versions.outputs.bot_version }}"
          echo "Wrapper version: ${{ steps.versions.outputs.wrapper_version }}"
          echo ""
          if [ "${{ inputs.skip_agents }}" != "true" ]; then
            echo "Would publish praisonaiagents ${{ steps.versions.outputs.agents_version }}"
          fi
          if [ "${{ inputs.skip_code }}" != "true" ]; then
            echo "Would publish praisonai-code ${{ steps.versions.outputs.code_version }}"
          fi
          if [ "${{ inputs.skip_bot }}" != "true" ]; then
            echo "Would publish praisonai-bot ${{ steps.versions.outputs.bot_version }}"
          fi
          if [ "${{ inputs.skip_wrapper }}" != "true" ]; then
            echo "Would run bump_and_release.py ${{ steps.versions.outputs.wrapper_version }} --agents ${{ steps.versions.outputs.agents_version }} --code-pin ${{ steps.versions.outputs.code_version }} --bot-pin ${{ steps.versions.outputs.bot_version }}"
            echo "Would uv publish praisonai ${{ steps.versions.outputs.wrapper_version }}"
          fi

      - name: Publish praisonaiagents
        if: >-
          inputs.dry_run != true &&
          inputs.skip_agents != true &&
          steps.pypi_exists.outputs.skip_agents != 'true'
        working-directory: src/praisonai-agents
        env:
          NEW_VERSION: ${{ steps.versions.outputs.agents_version }}
          CURRENT: ${{ steps.versions.outputs.current_agents }}
        run: |
          set -euo pipefail
          python <<'PY'
          import os
          from pathlib import Path
          path = Path("pyproject.toml")
          content = path.read_text()
          current = os.environ["CURRENT"]
          new = os.environ["NEW_VERSION"]
          path.write_text(content.replace(f'version = "{current}"', f'version = "{new}"', 1))
          PY

          rm -rf dist
          uv lock
          uv build
          uv publish

      - name: Wait for praisonaiagents on PyPI
        if: >-
          inputs.dry_run != true &&
          inputs.skip_agents != true &&
          steps.pypi_exists.outputs.skip_agents != 'true'
        run: |
          set -euo pipefail
          PACKAGE="praisonaiagents"
          VERSION="${{ steps.versions.outputs.agents_version }}"
          MAX_WAIT=600
          INTERVAL=30
          START=$(date +%s)

          while true; do
            if curl -fsSL "https://pypi.org/pypi/${PACKAGE}/${VERSION}/json" >/dev/null; then
              echo "✅ ${PACKAGE}==${VERSION} is available on PyPI"
              exit 0
            fi
            ELAPSED=$(( $(date +%s) - START ))
            if [ "$ELAPSED" -ge "$MAX_WAIT" ]; then
              echo "❌ Timeout waiting for ${PACKAGE}==${VERSION} on PyPI"
              exit 1
            fi
            echo "⏳ Waiting for ${PACKAGE}==${VERSION} ($(( MAX_WAIT - ELAPSED ))s remaining...)"
            sleep "$INTERVAL"
          done

      - name: Commit agents version bump
        if: >-
          inputs.dry_run != true &&
          inputs.skip_agents != true &&
          steps.pypi_exists.outputs.skip_agents != 'true'
        run: |
          set -euo pipefail
          git add src/praisonai-agents/pyproject.toml src/praisonai-agents/uv.lock
          git diff --cached --quiet && { echo "No agents files to commit"; exit 0; }
          git commit -m "Bump praisonaiagents to ${{ steps.versions.outputs.agents_version }}"
          git pull --rebase origin main
          git push origin main

      - name: Publish praisonai-code
        if: >-
          inputs.dry_run != true &&
          inputs.skip_code != true &&
          steps.pypi_exists.outputs.skip_code != 'true'
        working-directory: src/praisonai-code
        env:
          NEW_VERSION: ${{ steps.versions.outputs.code_version }}
          CURRENT: ${{ steps.versions.outputs.current_code }}
        run: |
          set -euo pipefail
          python <<'PY'
          import os
          import re
          from pathlib import Path
          new = os.environ["NEW_VERSION"]
          current = os.environ["CURRENT"]
          pyproject = Path("pyproject.toml")
          content = pyproject.read_text()
          pyproject.write_text(content.replace(f'version = "{current}"', f'version = "{new}"', 1))
          init_py = Path("praisonai_code/__init__.py")
          init_content = init_py.read_text()
          init_py.write_text(re.sub(r'__version__ = "[^"]+"', f'__version__ = "{new}"', init_content, count=1))
          PY

          rm -rf dist
          uv lock
          uv build
          uv publish

      - name: Wait for praisonai-code on PyPI
        if: >-
          inputs.dry_run != true &&
          inputs.skip_code != true &&
          steps.pypi_exists.outputs.skip_code != 'true'
        run: |
          set -euo pipefail
          PACKAGE="praisonai-code"
          VERSION="${{ steps.versions.outputs.code_version }}"
          MAX_WAIT=600
          INTERVAL=30
          START=$(date +%s)

          while true; do
            if curl -fsSL "https://pypi.org/pypi/${PACKAGE}/${VERSION}/json" >/dev/null; then
              echo "✅ ${PACKAGE}==${VERSION} is available on PyPI"
              exit 0
            fi
            ELAPSED=$(( $(date +%s) - START ))
            if [ "$ELAPSED" -ge "$MAX_WAIT" ]; then
              echo "❌ Timeout waiting for ${PACKAGE}==${VERSION} on PyPI"
              exit 1
            fi
            echo "⏳ Waiting for ${PACKAGE}==${VERSION} ($(( MAX_WAIT - ELAPSED ))s remaining...)"
            sleep "$INTERVAL"
          done

      - name: Commit praisonai-code version bump
        if: >-
          inputs.dry_run != true &&
          inputs.skip_code != true &&
          steps.pypi_exists.outputs.skip_code != 'true'
        run: |
          set -euo pipefail
          git add src/praisonai-code/pyproject.toml src/praisonai-code/uv.lock src/praisonai-code/praisonai_code/__init__.py
          git diff --cached --quiet && { echo "No code files to commit"; exit 0; }
          git commit -m "Bump praisonai-code to ${{ steps.versions.outputs.code_version }}"
          git pull --rebase origin main
          git push origin main

      - name: Publish praisonai-bot
        if: >-
          inputs.dry_run != true &&
          inputs.skip_bot != true &&
          steps.pypi_exists.outputs.skip_bot != 'true'
        working-directory: src/praisonai-bot
        env:
          NEW_VERSION: ${{ steps.versions.outputs.bot_version }}
          CURRENT: ${{ steps.versions.outputs.current_bot }}
        run: |
          set -euo pipefail
          python <<'PY'
          import os
          import re
          from pathlib import Path
          new = os.environ["NEW_VERSION"]
          current = os.environ["CURRENT"]
          pyproject = Path("pyproject.toml")
          content = pyproject.read_text()
          pyproject.write_text(content.replace(f'version = "{current}"', f'version = "{new}"', 1))
          version_py = Path("praisonai_bot/_version.py")
          version_content = version_py.read_text()
          version_py.write_text(re.sub(r'__version__ = "[^"]+"', f'__version__ = "{new}"', version_content, count=1))
          PY

          rm -rf dist
          uv lock
          uv build
          uv publish

      - name: Wait for praisonai-bot on PyPI
        if: >-
          inputs.dry_run != true &&
          inputs.skip_bot != true &&
          steps.pypi_exists.outputs.skip_bot != 'true'
        run: |
          set -euo pipefail
          PACKAGE="praisonai-bot"
          VERSION="${{ steps.versions.outputs.bot_version }}"
          MAX_WAIT=600
          INTERVAL=30
          START=$(date +%s)

          while true; do
            if curl -fsSL "https://pypi.org/pypi/${PACKAGE}/${VERSION}/json" >/dev/null; then
              echo "✅ ${PACKAGE}==${VERSION} is available on PyPI"
              exit 0
            fi
            ELAPSED=$(( $(date +%s) - START ))
            if [ "$ELAPSED" -ge "$MAX_WAIT" ]; then
              echo "❌ Timeout waiting for ${PACKAGE}==${VERSION} on PyPI"
              exit 1
            fi
            echo "⏳ Waiting for ${PACKAGE}==${VERSION} ($(( MAX_WAIT - ELAPSED ))s remaining...)"
            sleep "$INTERVAL"
          done

      - name: Commit praisonai-bot version bump
        if: >-
          inputs.dry_run != true &&
          inputs.skip_bot != true &&
          steps.pypi_exists.outputs.skip_bot != 'true'
        run: |
          set -euo pipefail
          git add src/praisonai-bot/pyproject.toml src/praisonai-bot/uv.lock src/praisonai-bot/praisonai_bot/_version.py
          git diff --cached --quiet && { echo "No bot files to commit"; exit 0; }
          git commit -m "Bump praisonai-bot to ${{ steps.versions.outputs.bot_version }}"
          git pull --rebase origin main
          git push origin main

      - name: Bump and release wrapper
        if: >-
          inputs.dry_run != true &&
          inputs.skip_wrapper != true &&
          steps.pypi_exists.outputs.skip_wrapper != 'true'
        run: |
          set -euo pipefail
          python src/praisonai/scripts/bump_and_release.py "${{ steps.versions.outputs.wrapper_version }}" \
            --agents "${{ steps.versions.outputs.agents_version }}" \
            --code-pin "${{ steps.versions.outputs.code_version }}" \
            --bot-pin "${{ steps.versions.outputs.bot_version }}" \
            --wait --max-wait 600 --no-add-all

      - name: Publish praisonai wrapper to PyPI
        if: >-
          inputs.dry_run != true &&
          inputs.skip_wrapper != true &&
          steps.pypi_exists.outputs.skip_wrapper != 'true'
        working-directory: src/praisonai
        run: uv publish

      - name: Wait for praisonai on PyPI
        if: >-
          inputs.dry_run != true &&
          inputs.skip_wrapper != true &&
          steps.pypi_exists.outputs.skip_wrapper != 'true'
        run: |
          set -euo pipefail
          PACKAGE="praisonai"
          VERSION="${{ steps.versions.outputs.wrapper_version }}"
          MAX_WAIT=600
          INTERVAL=30
          START=$(date +%s)

          while true; do
            if curl -fsSL "https://pypi.org/pypi/${PACKAGE}/${VERSION}/json" >/dev/null; then
              echo "✅ ${PACKAGE}==${VERSION} is available on PyPI"
              exit 0
            fi
            ELAPSED=$(( $(date +%s) - START ))
            if [ "$ELAPSED" -ge "$MAX_WAIT" ]; then
              echo "❌ Timeout waiting for ${PACKAGE}==${VERSION} on PyPI"
              exit 1
            fi
            echo "⏳ Waiting for ${PACKAGE}==${VERSION} ($(( MAX_WAIT - ELAPSED ))s remaining...)"
            sleep "$INTERVAL"
          done

      - name: Verify PyPI versions
        if: inputs.dry_run != true
        run: |
          set -euo pipefail
          AGENTS="${{ steps.versions.outputs.agents_version }}"
          CODE="${{ steps.versions.outputs.code_version }}"
          BOT="${{ steps.versions.outputs.bot_version }}"
          WRAPPER="${{ steps.versions.outputs.wrapper_version }}"

          if [ "${{ inputs.skip_agents }}" != "true" ]; then
            echo "✅ praisonaiagents==${AGENTS}"
          fi

          if [ "${{ inputs.skip_code }}" != "true" ]; then
            echo "✅ praisonai-code==${CODE}"
          fi

          if [ "${{ inputs.skip_bot }}" != "true" ]; then
            echo "✅ praisonai-bot==${BOT}"
          fi

          if [ "${{ inputs.skip_wrapper }}" != "true" ]; then
            echo "✅ praisonai==${WRAPPER}"
          fi
