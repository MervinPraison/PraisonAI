name: Claude Assistant

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned, labeled]
  pull_request_review:
    types: [submitted]

jobs:
  claude-response:
    # Allow: human users, github-actions[bot] (auto-comments/labels)
    # Block: dependabot, cursor, renovate, other bots
    if: |
      (
        !contains(github.actor, '[bot]') ||
        github.actor == 'github-actions[bot]'
      ) &&
      github.actor != 'dependabot[bot]' &&
      github.actor != 'cursor[bot]' &&
      github.actor != 'renovate[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          trigger_phrase: "@claude"
          label_trigger: "claude"
          direct_prompt: |
            Analyze this issue and implement a fix following AGENTS.md:
            1. Read AGENTS.md for repo guidelines
            2. Search the codebase and identify the root cause
            3. Create a fix branch and implement a minimal, focused fix
            4. Run tests to verify
            5. Commit, push, and create a PR using `gh pr create`
            CRITICAL: You MUST create the PR automatically using `gh pr create`. Do NOT just provide a link.
          allowed_tools: |
            Bash(git:*)
            Bash(python:*)
            Bash(pip:*)
            Bash(conda:*)
            Bash(pytest:*)
            Bash(gh:*)
            Bash(python -m pytest:*)
            Bash(python -m pip:*)
            Bash(poetry:*)
            View
            GlobTool
            GrepTool
            BatchTool
            Edit
            Replace
            mcp__github__get_issue
            mcp__github__get_issue_comments
            mcp__github__update_issue
          timeout_minutes: 30
