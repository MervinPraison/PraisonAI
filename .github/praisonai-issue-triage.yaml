framework: "praisonai"
process: workflow
topic: "Autonomous Issue Resolution and PR Creation"
planning: false

roles:
  issue_analyst:
    role: "GitHub Issue Analyst"
    goal: "Read the GitHub issue, understand the required changes, and map the problem to the local codebase"
    backstory: "You are an expert software analyst who reads bug reports and feature requests. You excel at taking a problem description and finding exactly which files in the codebase need to be modified. Your primary job is discovery and planning."
    tools:
      - "execute_command"

  software_engineer:
    role: "Autonomous Software Engineer"
    goal: "Create a branch, implement the required code changes, run tests, then commit and push"
    backstory: "You are a senior software engineer who writes flawless code. You always branch off main first, implement changes using shell commands, verify with git diff, run tests, then commit and push."
    tools:
      - "execute_command"
      - "github_create_branch"
      - "github_commit_and_push"

  release_manager:
    role: "Release and CI Manager"
    goal: "Open the Pull Request linking to the issue and notify the user"
    backstory: "You are a DevOps Release Engineer. You open clean Pull Requests using the gh CLI and post a summary comment on the issue."
    tools:
      - "github_create_pull_request"
      - "execute_command"

steps:
  - name: Analyze Issue
    agent: issue_analyst
    action: >
      Thoroughly analyze the issue and the repository. Follow these steps in order.

      First, set up git identity by running two commands via execute_command: run
      'git config user.name PraisonAI' and then 'git config user.email praison@users.noreply.github.com'.

      Second, read the pre-fetched issue context by running via execute_command: 'cat .github/triage-context.md'.
      Do NOT pass a cwd argument.

      Third, read architecture guidelines by running via execute_command: 'cat src/praisonai-agents/AGENTS.md'.

      Fourth, validate architecture before writing any code.
      Determine if this is a Core SDK change (praisonaiagents/), a Wrapper change (praisonai/),
      or a Tools change that belongs in the MervinPraison/PraisonAI-Tools repository.
      Check whether it duplicates existing functionality or adds new dependencies.
      If any check fails or the issue is invalid, do NOT create a PR — just report the findings.

      Fifth, explore the codebase using execute_command with grep, find, or cat
      to identify the exact files and line numbers that need to change.

      Output a detailed plan listing the routing decision, architecture validation result,
      and the exact files and lines to modify.
    expected_output: A detailed analysis with routing decision, architecture validation, and a file-level change plan.

  - name: Implement Fix
    agent: software_engineer
    action: >
      You are working inside the cloned repository. Determine the repository root by running
      execute_command with command='git rev-parse --show-toplevel'.
      Do NOT ask for confirmation. Do NOT use placeholder paths. Act immediately.

      Step 1 — Create branch: call github_create_branch with branch_name=praisonai/issue-{{ISSUE_NUMBER}}.

      Step 2 — Implement changes. Use execute_command (no cwd argument) to write files.
      To replace text in a file run: python3 -c "content=open('file').read(); open('file','w').write(content.replace('OLD','NEW'))"
      After each edit verify with execute_command: git diff

      Step 3 — Run tests: execute_command with command=python3 -m pytest src/praisonai-agents/tests/ -x -q --timeout=30 -p no:warnings

      Step 4 — Commit and push: call github_commit_and_push with a descriptive commit_message.
    expected_output: Confirmation that the branch was created, changes implemented, tests passed, and branch pushed.
    dependencies: [Analyze Issue]

  - name: Create Pull Request
    agent: release_manager
    action: >
      Open the Pull Request and notify the issue author. Follow these steps in order.

      First, create the PR using the github_create_pull_request tool with
      title set to 'fix: resolve issue #{{ISSUE_NUMBER}}',
      body set to 'Fixes #{{ISSUE_NUMBER}}. Autonomously resolved by PraisonAI.',
      head_branch set to praisonai/issue-{{ISSUE_NUMBER}},
      and base_branch set to main.

      Second, post a comment on the issue via execute_command running:
      gh issue comment {{ISSUE_NUMBER}} -b "PraisonAI has analyzed the issue and opened a Pull Request with a fix."
    expected_output: The URL of the successfully created Pull Request.
    dependencies: [Implement Fix]
