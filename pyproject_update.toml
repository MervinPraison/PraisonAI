[project]
name = "praisonai-tools"
version = "0.2.25"  # Bumped for GNAP feature
description = "Extended tools for PraisonAI Agents"
authors = [
    {name = "Mervin Praison"}
]
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
keywords = ["ai", "agents", "tools", "praisonai", "custom-tools", "plugin", "gnap", "git-native"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "praisonaiagents>=0.0.1",
]

[project.scripts]
praisonai-tools = "praisonai_tools.cli:main"

# Entry points for storage backends
[project.entry-points."praisonaiagents.storage.backends"]
gnap = "praisonai_tools.gnap:get_gnap_backend"

[project.optional-dependencies]

dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
]
wordpress = [
    "praisonaiwp[ai]>=0.1.0",
]
# Optional git dependency for GNAP backend
gnap = [
    "GitPython>=3.1.0",
]

[project.urls]
Homepage = "https://docs.praison.ai"
Repository = "https://github.com/MervinPraison/PraisonAI-Tools"
Documentation = "https://docs.praison.ai/tools"
Issues = "https://github.com/MervinPraison/PraisonAI-Tools/issues"

[build-system]
requires = ["hatchling>=1.0.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["praisonai_tools"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"