    "python-telegram-bot>=20.0",
    "discord.py>=2.0.0",
    "slack_sdk>=3.0.0",
    "slack-bolt>=1.18.0",
    "brotlicffi>=1.0.0",
    "aiohttp>=3.8.0",
    "ddgs>=9.0.0",  # DuckDuckGo search for agent web tools
    "psutil>=5.9.0",  # Shell tools (execute_command, list_processes, get_system_info)
]
bot-whatsapp-web = [
    # WhatsApp Web mode (experimental, token-free via QR scan)
    "neonize>=0.3.14",
    "qrcode>=7.0",
]
# Storage backend dependencies
redis = [
    "redis>=5.0.0",
]
mongodb = [
    "pymongo>=4.6.0",
]
postgresql = [
    "psycopg2-binary>=2.9.0",
]
dynamodb = [
    "boto3>=1.35.0",
]
claw = [
    # PraisonAI 🦞 — Full dashboard + bots + memory + knowledge + gateway
    # Install: pip install "praisonai[claw]"
    "aiui[all]>=0.3.100",
    "praisonaiagents[all]>=1.5.40",
    # UI + persistence
    "chainlit>=2.8.5,<=2.9.4",
    "sqlalchemy>=2.0.36",
    "aiosqlite>=0.20.0",
    "greenlet>=3.0.3",
    "flask>=3.0.0",
    # Gateway
    "fastapi>=0.115.0",
    "uvicorn>=0.34.0",
    "sse-starlette>=1.6.0",
    # Search + browsing
    "tavily-python==0.5.0",
    "crawl4ai>=0.7.0",
    "playwright>=1.47.0",    # required by crawl4ai — browsers still need: playwright install chromium
    "websockets>=12.0",
    "ddgs>=9.0.0",
    # Shell tools
    "psutil>=5.9.0",
    # Bot channels (Telegram, Discord, Slack)
    "python-telegram-bot>=20.0",
    "discord.py>=2.0.0",
    "slack_sdk>=3.0.0",
    "slack-bolt>=1.18.0",
    "brotlicffi>=1.0.0",
    "aiohttp>=3.8.0",
    # Storage backends
    "redis>=5.0.0",
    "pymongo>=4.6.0", 
    "psycopg2-binary>=2.9.0",
    "boto3>=1.35.0",
]
dev = [
    "textual-dev>=1.0.0",
    "pytest>=7.0.0",
    "pytest-asyncio>=0.21.0",
]

[project.urls]
Homepage = "https://docs.praison.ai"
Repository = "https://github.com/mervinpraison/PraisonAI"

[tool.uv.sources]
praisonaiagents = { path = "../praisonai-agents" }

[tool.uv]
# Exclude from lock resolution — these cause cross-extra conflicts that
# never occur at install time (nobody installs [claw]+[autogen]+[crewai] together):
#   neonize:        conflicts with autogen-core (protobuf version)
#   magika:         numpy>=2.1 (via markitdown) vs pyautogen numpy<2
#   neo4j-graphrag: json-repair tight pins vs crewai transitive deps
override-dependencies = [
    "neonize ; sys_platform == 'never'",
    "magika ; sys_platform == 'never'",
    "neo4j-graphrag ; sys_platform == 'never'",
]

[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[tool.setuptools.dynamic]
version = {attr = "praisonai.version.__version__"}

[tool.setuptools.packages.find]
where = ["."]
include = ["praisonai*"]
