    "tavily-python==0.5.0",
    "crawl4ai>=0.7.0",
    "playwright>=1.47.0",
    "websockets>=12.0",
    "plotly>=5.24.0",
    "yfinance>=0.2.44",
    "ddgs>=9.0.0",
    "psutil>=5.9.0",  # Shell tools
    # Storage backends
    "redis>=5.0.0",
    "pymongo>=4.6.0", 
    "psycopg2-binary>=2.9.0",
    "boto3>=1.35.0",
