# Example: Agent with MCP Tool Integration
#
# This example shows how to configure an agent with MCP (Model Context Protocol)
# servers for additional tool capabilities.
#
# Usage:
#   praisonai workflow run --file examples/yaml/agent-with-mcp.yaml

agent:
  name: mcp_assistant
  instructions: |
    You are a helpful assistant with access to filesystem and time tools.
    Use the MCP tools when needed to help users with file operations or time queries.
  llm: gpt-4o-mini

# MCP server configuration
mcp:
  servers:
    filesystem:
      # Filesystem access for the agent
      command: npx
      args:
        - "-y"
        - "@modelcontextprotocol/server-filesystem"
        - "."
      env: {}
      enabled: true
    
    time:
      # Time and date utilities
      command: npx
      args:
        - "-y" 
        - "@modelcontextprotocol/server-time"
      env: {}
      enabled: true

# NOTE: Per-server tool filtering (tools.include/exclude) is not yet supported
# by the MCP server config schema. Tool filtering should be applied after
# calling mcp.get_tools() in your application code.