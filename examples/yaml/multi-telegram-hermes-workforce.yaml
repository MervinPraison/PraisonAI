# Multi-Telegram Channel Hermes Workforce Example
# Generated by `praisonai onboard` with multi-channel support
# Start with: praisonai gateway start --config multi-telegram-hermes-workforce.yaml

gateway:
  host: "127.0.0.1"
  port: 8765

# Legacy single-agent block for backward compatibility
agent:
  name: "assistant"
  instructions: "You are a helpful AI assistant. You can search the web, manage schedules, and remember past conversations. Use your tools proactively."
  model: "gpt-4o-mini"

# Multi-agent workforce with different specialized roles
agents:
  cfo:
    instructions: "You are a CFO agent. You are a helpful AI assistant. Use your tools proactively to help with CFO-related tasks like financial analysis, budget planning, and cost optimization."
    model: gpt-4o-mini
    memory: false

  ops:
    instructions: "You are an ops agent. You are a helpful AI assistant. Use your tools proactively to help with ops-related tasks like system monitoring, deployment, and infrastructure management."
    model: gpt-4o-mini
    memory: false

  content:
    instructions: "You are a content agent. You are a helpful AI assistant. Use your tools proactively to help with content-related tasks like writing, editing, and content strategy."
    model: gpt-4o-mini
    memory: false

# Multiple Telegram channels - each with unique tokens and routing
channels:
  telegram_cfo:
    platform: telegram
    token: ${TELEGRAM_CFO_BOT_TOKEN}
    group_policy: mention_only
    allowed_users: ${TELEGRAM_ALLOWED_USERS}
    # auto_approve_tools: true
                               # Chat bots cannot show CLI approval prompts; safe tools auto-approved by default.
    routes:
      default: cfo

  telegram_ops:
    platform: telegram
    token: ${TELEGRAM_OPS_BOT_TOKEN}
    group_policy: mention_only
    allowed_users: ${TELEGRAM_ALLOWED_USERS}
    # auto_approve_tools: true
                               # Chat bots cannot show CLI approval prompts; safe tools auto-approved by default.
    routes:
      default: ops

  telegram_content:
    platform: telegram
    token: ${TELEGRAM_CONTENT_BOT_TOKEN}
    group_policy: mention_only
    allowed_users: ${TELEGRAM_ALLOWED_USERS}
    # auto_approve_tools: true
                               # Chat bots cannot show CLI approval prompts; safe tools auto-approved by default.
    routes:
      default: content

# Legacy routing block
routing:
  default: assistant